version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.backend

    container_name: echotwin-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - .:/app

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.frontend

    container_name: echotwin-frontend

    ports:
      - "3000:3000"

    depends_on:
      - backend

    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

    volumes:
      - ./frontend:/app
